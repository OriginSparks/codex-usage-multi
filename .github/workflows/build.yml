name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            artifact: codex-usage-darwin-arm64
            bin: codex-usage
          - goos: darwin
            goarch: amd64
            artifact: codex-usage-darwin-amd64
            bin: codex-usage
          - goos: linux
            goarch: amd64
            artifact: codex-usage-linux-amd64
            bin: codex-usage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          go build -o "dist/${{ matrix.bin }}" ./cmd/codex-usage

      - name: Package artifact
        run: |
          mkdir -p out/${{ matrix.artifact }}
          cp dist/${{ matrix.bin }} out/${{ matrix.artifact }}/
          cp README.md out/${{ matrix.artifact }}/
          cp LICENSE out/${{ matrix.artifact }}/ 2>/dev/null || true
          tar -C out -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error
